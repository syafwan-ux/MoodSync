<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/signup.css">
    <title>Sign Up Page</title>
    
</head>
<body>

<div class="flex-container">
    <!-- Header -->
    <div class="logo-container">
    <div class="logo-placeholder">
         <img src="assets/svg/Iconlast.svg" class="icon"></img>
    </div>
    </div>

    <div class="header">
        <h1>Mulai Perjalananmu</h1>
    </div>

    <div class="container">

        <!-- Form -->
        <form>
            <label for="name">Full name</label>
            <input id="name" type="text" placeholder="Enter your name" />

            <label for="email">Email address</label>
            <input id="email" type="email" placeholder="example@canvas.com" />

            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Min. 8 characters" />

            <p style="text-align:center; font-size:16px; color:#555; font-family: 'Manrope'; font-weight: 400;">
                By joining, you agree to our 
                <a href="#" style=" font-family: 'Manrope'; font-weight: 800;">Terms of <br>Service</a> and 
                <a href="#" style=" font-family: 'Manrope'; font-weight: 800;">Privacy Policy</a>.
            </p>

            <button type="submit" style="font-size: 20px;">Create Account</button>
        </form>

        <!-- Divider -->
        <div class="divider">
            <div></div>
            <span style="font-family: 'Manrope'; font-weight: 800; font-size: 14px;">Or Sign up with</span>
            <div></div>
        </div>

        <!-- Social Buttons -->
        <div class="social-buttons" style="display:flex; gap:10px;">
            <button>Google</button>
            <button>Apple</button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Already have an account? <a href="login.html">Log in instead</a>
    </div>

</div>

</body>
</html>
