<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/today.css">
    <title>MoodSync</title>
</head>

<body>

    <!-- APP CONTAINER -->
    <div class="container">

        <!-- HEADER -->
        <header class="header">
            <div class="logo">
                <!-- profile circle placeholder -->
            </div>

            <h1>MoodSync</h1>

            <button class="notif-btn">
                Notification
            </button>
        </header>

        <!-- MAIN CONTENT -->
        <main class="main">

            <p class="subtitle">HARI INI AKAN MENJADI HARIMU...</p>

            <h2>Bagaimana Perasaanmu hari ini?</h2>

            <!-- MOOD GRID -->
            <div class="mood-grid">
                <button class="mood">Biasa Saja</button>
                <button class="mood">Sedih</button>
                <button class="mood">Bahagia</button>
                <button class="mood">Senang</button>
                <button class="mood">Marah</button>
                <button class="mood">Mengantuk</button>
            </div>

            <h3>Apa yang membuatmu sibuk hari ini?</h3>

            <!-- ACTIVITY BUTTONS -->
            <div class="activity-list">
                <div class="row">
                    <button>Bekerja</button>
                    <button>Sosial</button>
                </div>
                <div class="row">
                    <button>Tidur</button>
                    <button>Olahraga</button>
                </div>
                <div class="row">
                    <button>Makanan</button>
                    <button>Zen</button>
                </div>
                <div class="row">
                    <button>Kreativitas</button>
                    <button>Hal lain</button>
                </div>
            </div>

            <h3>Bagikan Ceritamu!</h3>

            <!-- NOTE -->
            <textarea placeholder="Ini opsional ya...."></textarea>

            <button class="save-btn">
                Simpan Catatan Harian
            </button>

        </main>

        <!-- NAVBAR -->
        <nav class="navbar">
            <button onclick="window.location.href='today.html'">TODAY</button>
            <button onclick="window.location.href='history.html'">HISTORY</button>
            <button onclick="window.location.href='insights.html'">INSIGHTS</button>
            <button onclick="window.location.href='settings.html'">SETTINGS</button>
        </nav>

    </div>

</body>
</html>
